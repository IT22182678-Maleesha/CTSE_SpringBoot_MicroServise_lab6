server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server: # This level is necessary for the routes to be recognized
        webmvc: # Use webflux if you want to use reactive programming, but for simplicity, we are using webmvc here
          routes: # When using Gateway instead of Reactive Gateway, the routes should be defined under 'server.webmvc.routes'
            - id: order-service
              uri: http://localhost:8081
              predicates:
                - Path=/orders/**
